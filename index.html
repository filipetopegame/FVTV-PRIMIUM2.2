<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FVTV PREMIUM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background-image: url('https://i.ibb.co/GQkmq6MY/FVTV-PREMIUM-2-0.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { background: rgba(0, 0, 0, 0.9); padding: 10px; text-align: center; border-bottom: 2px solid var(--primary); position: relative; z-index: 10; font-weight: bold; }
        .adm-gear { position: absolute; right: 15px; top: 15px; cursor: pointer; opacity: 0.2; }

        #salesScreen { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 50px; overflow-y: auto; backdrop-filter: brightness(0.4); }
        .main-panel { width: 90%; max-width: 420px; text-align: center; padding-bottom: 40px; }
        .login-group { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #475569; margin-bottom: 15px; }
        .input-code { background: #000; color: #fff; width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; margin-bottom: 12px; text-align: center; }
        
        .btn-wide { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: block; text-decoration: none; text-align: center; }
        .btn-enter { background: var(--primary); color: white; }
        .btn-plan { background: var(--card); color: white; border: 1px solid #475569; }
        .btn-plan span { display: block; font-size: 10px; opacity: 0.7; }

        #modalCadastro, #modalPix { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .cadastro-box { background: white; color: black; width: 90%; max-width: 350px; padding: 25px; border-radius: 15px; text-align: center; }
        .cadastro-box h2 { font-size: 18px; margin-bottom: 15px; color: #000; font-weight: 800; }
        .cadastro-box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; color: #333; }
        
        #qrcodeCanvas { margin: 15px auto; display: flex; justify-content: center; }
        #qrcodeCanvas img { border: 10px solid white; }

        .pix-area { background: #f1f5f9; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; margin: 10px 0; word-break: break-all; font-size: 9px; color: #334155; max-height: 60px; overflow-y: auto; }
        .btn-copy { background: #64748b; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; margin-bottom: 15px; width: 100%; font-weight: bold; }

        #mainApp { display: none; flex-direction: column; width: 100%; height: 100vh; }
        .player-controls { background: #000; padding: 10px; display: flex; justify-content: center; gap: 10px; }
        #player-wrapper { flex: 1; position: relative; background: #000; overflow: hidden; }
        .iframe-player { width: 100%; height: 100%; border: none; position: absolute; }
        
        .bloqueio { position: absolute; z-index: 9999; display: none; background: #000; }
        #blockCenter { top: 0; left: 35%; width: 30%; height: 65px; } 
        #blockHome { top: 0; right: 0; width: 80px; height: 75px; }    

        .modo-tv { top: -55px; height: calc(100% + 55px); }
        .modo-filmes { top: 0; left: -45px; width: calc(100% + 45px); }

        #admPanel { display: none; padding: 20px; background: #0f172a; flex-direction: column; overflow-y: auto; z-index: 100; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; }
        .table-container { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; margin-top: 15px; color: white; min-width: 1100px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 11px; }
        .btn-adm { padding: 6px 10px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-right: 3px; color: white; font-size: 10px; }
    </style>
</head>
<body onload="verificarLoginSalvo()">

<div class="header">FVTV PREMIUM <span class="adm-gear" onclick="abrirAdm()">⚙️</span></div>

<div id="salesScreen">
    <div class="main-panel">
        <div class="login-group">
            <h5 style="font-size: 10px; margin-bottom: 10px; opacity: 0.6;">JÁ POSSUI ACESSO?</h5>
            <input type="text" id="loginInput" class="input-code" placeholder="Digite seu código">
            <button class="btn-wide btn-enter" onclick="logar()">Entrar no Player</button>
        </div>
        
        <div class="btn-wide btn-plan" onclick="abrirCadastro('1 MÊS', 30, '00020126580014br.gov.bcb.pix0136f8ae5e7c-db8e-4970-8239-45b35742ef31520400005303986540530.005802BR5923Filipe Pereira Trindade6006Brasil62290525202604110524QFSV3WX4NJ2E663040D32')">1 MÊS PREMIUM <span>R$ 30,00</span></div>
        <div class="btn-wide btn-plan" onclick="abrirCadastro('3 MESES', 90, '00020126580014br.gov.bcb.pix0136f8ae5e7c-db8e-4970-8239-45b35742ef31520400005303986540590.005802BR5923Filipe Pereira Trindade6006Brasil62290525202604110454YJC8KKJ3QUQTH63041509')">3 MESES PREMIUM <span>R$ 90,00</span></div>
        <div class="btn-wide btn-plan" onclick="abrirCadastro('6 MESES', 150, '00020126580014br.gov.bcb.pix0136f8ae5e7c-db8e-4970-8239-45b35742ef315204000053039865406150.005802BR5923Filipe Pereira Trindade6006Brasil62290525202604110456R8W2P71QKG0F86304D267')">6 MESES PREMIUM <span>R$ 150,00</span></div>
        <div class="btn-wide btn-plan" onclick="abrirCadastro('ANUAL', 300, '00020126580014br.gov.bcb.pix0136f8ae5e7c-db8e-4970-8239-45b35742ef315204000053039865406300.005802BR5923Filipe Pereira Trindade6006Brasil62290525202604110458K42BI66W2320D6304B47B')">PLANO ANUAL <span>R$ 300,00</span></div>
        
        <button class="btn-wide" style="background:transparent; color:#94a3b8; border:1px solid #334155; font-size:11px;" onclick="iniciarTeste()">SOLICITAR TESTE GRÁTIS (4H)</button>
    </div>
</div>

<div id="modalCadastro">
    <div class="cadastro-box">
        <h2>CADASTRO</h2>
        <input type="text" id="cadNome" placeholder="Nome Completo">
        <input type="text" id="cadCodigo" placeholder="Crie seu Código">
        <button class="btn-gerar" onclick="salvarNovoCliente()">GERAR PIX</button>
        <button onclick="fecharCadastro()" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<div id="modalPix">
    <div class="cadastro-box">
        <h2 id="pixTitulo">ESCANEIE O QR CODE</h2>
        <div id="qrcodeCanvas"></div>
        <p style="font-size: 11px;">Ou use o Pix Copia e Cola:</p>
        <div id="pixCopiaCola" class="pix-area"></div>
        <button class="btn-copy" onclick="copiarPix()">COPIAR CÓDIGO PIX</button>
        <p id="pixValor" style="font-weight:bold; margin-bottom:10px;"></p>
        <button class="btn-gerar" style="background:#25d366;" onclick="finalizarComZap()">Já paguei, ativar agora!</button>
    </div>
</div>

<div id="mainApp">
    <div class="player-controls">
        <button onclick="mudarGrade('tv')" style="padding:8px; background:#3b82f6; color:white; border:none; border-radius:5px; font-weight:bold;">📺 TV AO VIVO</button>
        <button onclick="mudarGrade('filmes')" style="padding:8px; background:#3b82f6; color:white; border:none; border-radius:5px; font-weight:bold;">🔍 FILMES E SÉRIES</button>
        <button onclick="logout()" style="padding:8px; background:#ef4444; color:white; border:none; border-radius:5px; font-weight:bold;">SAIR</button>
    </div>
    <div id="player-wrapper">
        <div id="blockCenter" class="bloqueio"></div>
        <div id="blockHome" class="bloqueio"></div>
    </div>
</div>

<div id="admPanel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Gestão de Clientes</h2>
        <button class="btn-adm" style="background:#ef4444; padding:10px;" onclick="location.reload()">Sair do ADM</button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>NOME</th>
                    <th>CÓDIGO</th>
                    <th>PLANO</th>
                    <th>CRIADO EM</th>
                    <th>VENCIMENTO</th>
                    <th>STATUS</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="admTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDKPnElj2EBY2Z-2YmrUP5E7ESjnFrJEdo",
        authDomain: "fvtv-premium.firebaseapp.com",
        databaseURL: "https://fvtv-premium-default-rtdb.firebaseio.com",
        projectId: "fvtv-premium",
        storageBucket: "fvtv-premium.firebasestorage.app",
        messagingSenderId: "709954808127",
        appId: "1:709954808127:web:a225917a5b8dce437f4b8a"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let pSel = "", vSel = 0, pixSel = "";

    // FUNÇÃO PARA VERIFICAR LOGIN AUTOMÁTICO
    function verificarLoginSalvo() {
        const salvo = localStorage.getItem('fvtv_code');
        if(salvo) {
            document.getElementById('loginInput').value = salvo;
            logar(true);
        }
    }

    function abrirCadastro(p, v, pix) { pSel = p; vSel = v; pixSel = pix; document.getElementById('modalCadastro').style.display = 'flex'; }
    function fecharCadastro() { document.getElementById('modalCadastro').style.display = 'none'; }
    
    function salvarNovoCliente() {
        const n = document.getElementById('cadNome').value;
        const c = document.getElementById('cadCodigo').value;
        if(!n || !c) return;
        database.ref('clientes/' + c).set({
            nome: n,
            plano: pSel,
            criadoEm: new Date().toISOString(),
            vencimento: new Date().toISOString(),
            status: 'Pendente'
        }).then(() => { mostrarPix(); });
    }

    function mostrarPix() {
        document.getElementById('modalCadastro').style.display = 'none';
        document.getElementById('modalPix').style.display = 'flex';
        document.getElementById('pixValor').innerText = "Total: R$ " + vSel + ",00";
        document.getElementById('pixCopiaCola').innerText = pixSel;
        document.getElementById('qrcodeCanvas').innerHTML = ""; 
        new QRCode(document.getElementById("qrcodeCanvas"), { text: pixSel, width: 180, height: 180 });
    }

    function copiarPix() { navigator.clipboard.writeText(pixSel); alert("Código Pix Copiado!"); }

    function finalizarComZap() {
        const n = document.getElementById('cadNome').value;
        const c = document.getElementById('cadCodigo').value;
        const texto = `Olá! Paguei o PIX do plano ${pSel}:\n*Nome:* ${n}\n*Código:* ${c}`;
        window.open(`https://wa.me/5521992976849?text=${encodeURIComponent(texto)}`, '_blank');
        location.reload();
    }

    function logar(auto = false) {
        const cod = document.getElementById('loginInput').value;
        database.ref('clientes/' + cod).once('value').then((snap) => {
            const data = snap.val();
            if(data && data.status !== 'Bloqueado' && new Date(data.vencimento) > new Date()) {
                localStorage.setItem('fvtv_code', cod); // SALVA O ACESSO
                document.getElementById('salesScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                mudarGrade('tv');
            } else { 
                if(!auto) alert("Acesso Inválido ou Expirado!"); 
                localStorage.removeItem('fvtv_code');
            }
        });
    }

    function logout() {
        localStorage.removeItem('fvtv_code');
        location.reload();
    }

    function mudarGrade(tipo) {
        const url = (tipo === 'tv') ? "https://saimo-tv.pages.dev/#/tv/" : "https://saimo-tv.pages.dev/#/movies";
        document.getElementById('blockCenter').style.display = 'block';
        document.getElementById('blockHome').style.display = 'block';
        const wrapper = document.getElementById('player-wrapper');
        const old = wrapper.querySelector('.iframe-player');
        if (old) old.remove();
        const iframe = document.createElement('iframe');
        iframe.className = `iframe-player ${(tipo === 'tv') ? 'modo-tv' : 'modo-filmes'}`;
        iframe.src = url; iframe.allowFullscreen = true;
        wrapper.appendChild(iframe);
    }

    function abrirAdm() { if(prompt("Senha:") === "97035855") { document.getElementById('salesScreen').style.display = 'none'; document.getElementById('admPanel').style.display = 'flex'; carregarTabela(); } }

    function carregarTabela() {
        database.ref('clientes').on('value', (snap) => {
            const tbody = document.getElementById('admTableBody'); tbody.innerHTML = '';
            snap.forEach((child) => {
                const c = child.val();
                tbody.innerHTML += `<tr>
                    <td>${c.nome || 'Sem Nome'}</td>
                    <td>${child.key}</td>
                    <td style="color:#3b82f6; font-weight:bold;">${c.plano || 'TESTE'}</td>
                    <td>${c.criadoEm ? new Date(c.criadoEm).toLocaleDateString('pt-BR') : '--'}</td>
                    <td>${new Date(c.vencimento).toLocaleDateString('pt-BR')}</td>
                    <td style="color:${c.status === 'Bloqueado' ? 'red' : (c.status === 'Pendente' ? 'orange' : '#22c55e')}">${c.status || 'Ativo'}</td>
                    <td>
                        <button class="btn-adm" style="background:#10b981;" onclick="addT('${child.key}','d')">+ DIAS</button>
                        <button class="btn-adm" style="background:#059669;" onclick="addT('${child.key}','m')">+ MESES</button>
                        <button class="btn-adm" style="background:#f59e0b;" onclick="toggleS('${child.key}','${c.status}')">BLOQ</button>
                        <button class="btn-adm" style="background:#ef4444;" onclick="remover('${child.key}')">EXCLUIR</button>
                    </td>
                </tr>`;
            });
        });
    }

    function addT(id, t) {
        const q = parseInt(prompt("Quantidade?"));
        if(!q) return;
        database.ref('clientes/'+id).once('value').then(s => {
            let d = new Date(s.val().vencimento);
            if(isNaN(d.getTime()) || d < new Date()) d = new Date();
            if(t === 'd') d.setDate(d.getDate() + q); else d.setMonth(d.getMonth() + q);
            database.ref('clientes/'+id).update({ vencimento: d.toISOString(), status: 'Ativo' });
        });
    }

    function toggleS(id, s) { database.ref('clientes/'+id).update({ status: s === 'Bloqueado' ? 'Ativo' : 'Bloqueado' }); }
    function remover(id) { if(confirm("Remover?")) database.ref('clientes/'+id).remove(); }

    function iniciarTeste() {
        const cod = "TESTE" + Math.floor(1000 + Math.random() * 9000);
        database.ref('clientes/' + cod).set({ nome: "Usuário Teste", plano: "TESTE GRÁTIS", criadoEm: new Date().toISOString(), vencimento: new Date(new Date().setHours(new Date().getHours() + 4)).toISOString(), status: 'Ativo' })
        .then(() => { alert("CÓDIGO: " + cod); document.getElementById('loginInput').value = cod; logar(); });
    }
</script>
</body>
</html>
